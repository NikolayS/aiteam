name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: |
          cd dashboard
          python -m unittest test_server -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check dashboard/

      - name: Ruff format check
        run: ruff format --check dashboard/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on shell scripts
        run: |
          shopt -s globstar nullglob
          files=$(find . -name '*.sh' -type f 2>/dev/null || true)
          if [ -n "$files" ]; then
            shellcheck $files
          else
            echo "No shell scripts found — skipping."
          fi

  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate example config is valid JSON
        run: python3 -c "import json; json.load(open('dashboard/config.example.json'))"

      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './.git/*' -print0 | \
            xargs -0 -I{} python3 -c "import json, sys; json.load(open(sys.argv[1]))" {}
