server {
    listen 443 ssl http2;
    server_name 1.pgai.team;

    ssl_certificate /etc/ssl/cloudflare/1.pgai.team.crt;
    ssl_certificate_key /etc/ssl/cloudflare/1.pgai.team.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Agent Dashboard
    location /dashboard {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Main bot (display :1) — VNC at root, inject dashboard nav link
    location / {
        proxy_pass http://127.0.0.1:6081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;

        # Inject dashboard nav bar into the noVNC HTML page
        sub_filter '</head>' '<style>
#pgai-nav{position:fixed;top:0;right:0;z-index:9999;display:flex;gap:8px;padding:6px 10px;background:rgba(15,17,23,0.85);backdrop-filter:blur(6px);border-bottom-left-radius:8px;font-family:system-ui,sans-serif;font-size:12px}
#pgai-nav a{color:#e0e0e0;text-decoration:none;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,0.07);transition:background 0.15s}
#pgai-nav a:hover{background:rgba(255,255,255,0.15)}
#pgai-nav a.active{background:#7c6af7;color:#fff}
</style></head>';
        sub_filter '<body' '<body><nav id="pgai-nav"><a href="/dashboard">📊 Dashboard</a><a href="/" class="active">🖥️ Screen</a></nav>';
        sub_filter_once on;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name 1.pgai.team;
    return 301 https://$host$request_uri;
}
